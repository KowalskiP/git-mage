name: release

# Publishes a GitHub release with signed bundles + the updater manifest
# (latest.json) whenever a version tag is pushed. The in-app updater points at
# this release's latest.json (see tauri.conf.json → plugins.updater.endpoints).
#
# Required repo secret:
#   TAURI_SIGNING_PRIVATE_KEY           contents of your updater private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  (empty if the key has no password)
#
# The updater endpoint in tauri.conf.json points at KowalskiP/git-mage; on a
# fork, point it at your own GitHub owner/repo before the first release.

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "GitMage ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
