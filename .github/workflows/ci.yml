name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri's Linux build dependencies (needed even for `cargo test`, which
      # compiles the lib and expands generate_context!).
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm deps
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Frontend: typecheck + bundle (also produces dist/ that the Rust build needs).
      - name: Build frontend
        run: npm run build

      - name: Frontend tests
        run: npm test

      - name: Backend tests
        working-directory: src-tauri
        run: cargo test

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
