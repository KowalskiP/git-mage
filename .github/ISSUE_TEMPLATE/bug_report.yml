name: Bug report
description: Something in GitMage is broken or behaves unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug! Please fill in as much as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a repository with …
        2. Click …
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: GitMage version
      description: See GitMage → About (or the release tag you installed).
      placeholder: v0.2.0
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How did you install it?
      options:
        - Downloaded .dmg from Releases
        - Built from source (npm run app:build / app:dev)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS & architecture
      placeholder: macOS 15.5, Apple Silicon (aarch64)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Any error toast text, terminal output, or screenshots.
